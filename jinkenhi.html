const getHyojun = (m) => { for (const [u,s] of HYOJUN_TABLE) if (m<=u) return s; return 750000; };

const WORK_HOURS_MONTH   = 162;
const SANROKYO_LIMIT_MONTH = 45;
const LEGAL_HOURS_MONTH  = 173;
const OVER_60H_THRESHOLD = 60;

const calcMonthlyOTHours = (rate) => {
  if (!rate) return 0;
  return Math.min(45 * rate / 100, 30);
};

const calcOvertimeDetail = (base, hours) => {
  if (hours<=0||base<=0) return {total:0,breakdown:[]};
  const hr = base/WORK_HOURS_MONTH;
  const legalInner = LEGAL_HOURS_MONTH - WORK_HOURS_MONTH; // 11h
  const h1 = Math.min(hours, legalInner);
  const pay1 = Math.round(hr*1.00*h1);
  const h2raw = Math.max(hours-legalInner,0);
  const h2cap = Math.max(OVER_60H_THRESHOLD-legalInner,0); // 49h
  const h2 = Math.min(h2raw,h2cap);
  const pay2 = Math.round(hr*1.25*h2);
  const h3 = Math.max(h2raw-h2cap,0);
  const pay3 = Math.round(hr*1.50*h3);
  const breakdown=[];
  if(h1>0) breakdown.push({label:"所定外・法定内",hours:h1,rate:1.00,pay:pay1});
  if(h2>0) breakdown.push({label:"法定時間外",   hours:h2,rate:1.25,pay:pay2});
  if(h3>0) breakdown.push({label:"60時間超割増", hours:h3,rate:1.50,pay:pay3});
  return {total:pay1+pay2+pay3,breakdown};
};

// ── ベア適用後の給与を計算 ──────────────────────────────
// bearAdj: { skillAdd: number, careerAdd: number, overrides: {[id]: {skillAdd?, careerAdd?}} }
const applyBear = (s, bearAdj) => {
  if (s.empType==="PART") return s;
  const ov = bearAdj.overrides?.[s.id] ?? {};
  if (s.empType==="EXEC") {
    const execAdd = ov.execAdd || 0;
    return { ...s, monthlyBase: s.monthlyBase + execAdd };
  }
  const skillAdd  = ov.skillAdd  !== undefined ? ov.skillAdd  : (bearAdj.skillAdd  || 0);
  const careerAdd = ov.careerAdd !== undefined ? ov.careerAdd : (bearAdj.careerAdd || 0);
  const newSkill  = (s.skillSalary  || 0) + skillAdd;
  const newCareer = (s.careerSalary || 0) + careerAdd;
  return { ...s, skillSalary:newSkill, careerSalary:newCareer, monthlyBase:newSkill+newCareer };
};

// ══════════════════════════════════════════════
//  計算ロジック
// ══════════════════════════════════════════════
const MONTH_IDX = Object.fromEntries(MONTHS.map((m,i)=>[m,i]));
const isWorking = (s, month) => {
  const mi = MONTH_IDX[month];
  const si = MONTH_IDX[s.workStartMonth ?? "4月"];
  const ei = MONTH_IDX[s.workEndMonth   ?? "3月"];
  if (si <= ei) return mi >= si && mi <= ei;
  return mi >= si || mi <= ei;
};

const calcMonthlyGross = (s, month) => {
  if (!isWorking(s,month)) return 0;
  let base = s.empType==="PART" ? s.hourlyWage*s.monthlyHours : s.monthlyBase;
  let overtime=0, posAll=0, extras=0;
  if (s.empType==="FULL"||s.empType==="CONTRACT") {
    // 手動上書きがあれば優先、なければ自動計算
    if (s.overtimeAmountOverride!=null && s.overtimeAmountOverride!=="") {
      overtime = Number(s.overtimeAmountOverride);
    } else if (s.overtimeRate>0) {
      overtime = calcOvertimeDetail(s.monthlyBase,calcMonthlyOTHours(s.overtimeRate)).total;
    }
    posAll = POSITION_ALLOWANCES[s.posAllowanceIdx]?.amount??0;
    extras = (s.commAllowance||0)+(s.housingAllowance||0);
  }
  return base+overtime+posAll+extras;
};
const calcBonus = (s,month) => {
  const en = month==="9月" ? s.bonus9Enable : s.bonus3Enable;
  if (!en) return 0;
  if (s.empType==="PART") return 0;
  // 全雇用形態で手動上書き優先
  const override = month==="9月" ? s.bonus9Amount : s.bonus3Amount;
  if (override!=null && override!=="") return Number(override);
  // 自動計算（月数×基本給÷6）
  const months = month==="9月" ? (s.bonus9Months??6) : (s.bonus3Months??6);
  return Math.round(s.monthlyBase * months / 6);
};
const calcInsMonth = (s,month) => {
  if (!isWorking(s,month)) return 0;
  const kaigo    = (s.age>=40 && s.age<=64) ? KAIGO_RATE_COMP : 0;
  const kosodate = KOSODATE_MONTHS.includes(month) ? KOSODATE_RATE : 0; // 子育て支援金は5月〜・会社負担のみ
  if (s.empType==="PART") {
    const gross = calcMonthlyGross(s, month);
    const hyojun = getHyojun(gross);
    if (s.insOverride!==null && s.insOverride!==undefined) {
      // 手動上書き値＋子育て支援金
      return s.insOverride + Math.round(hyojun * kosodate);
    }
    // 自動計算：正社員と同じ標準報酬月額テーブル
    if (gross <= 0) return 0;
    return Math.round(hyojun * (INS_RATE.health + INS_RATE.pension + INS_RATE.employ + kaigo + kosodate));
  }
  if (s.insOverride!==null && s.insOverride!==undefined) {
    // 手動上書き時：上書き値＋子育て支援金（標準報酬月額から逆算）
    const hyojun = getHyojun(s.empType==="EXEC" ? s.monthlyBase : calcMonthlyGross(s,month));
    return s.insOverride + Math.round(hyojun*kosodate);
  }
  if (s.empType==="EXEC") return Math.round(getHyojun(s.monthlyBase)*(INS_RATE.health+INS_RATE.pension+kaigo+kosodate));
  const gross = calcMonthlyGross(s,month);
  return Math.round(getHyojun(gross)*(INS_RATE.health+INS_RATE.pension+INS_RATE.employ+kaigo+kosodate));
};
const calcBonusInsMonth = (s,month) => {
  const override = month==="9月" ? s.bonus9InsOverride : s.bonus3InsOverride;
  const bonus = calcBonus(s,month);
  if (!bonus) return 0;
  const kosodate = KOSODATE_MONTHS.includes(month) ? KOSODATE_RATE : 0;
  if (override !== null && override !== undefined) {
    // 手動上書き時：上書き値＋子育て支援金
    return override + Math.round(Math.min(bonus,1500000)*kosodate);
  }
  if (s.empType==="EXEC") return Math.round(calcBonusIns(bonus)*((INS_RATE.health+INS_RATE.pension+kosodate)/(INS_RATE.health+INS_RATE.pension+INS_RATE.employ)));
  if (s.empType==="PART") return 0;
  return Math.round(Math.min(bonus,1500000)*(INS_RATE.health+INS_RATE.pension+INS_RATE.employ+kosodate));
};
const calcMonthlyTotal = (s,month) =>
  calcMonthlyGross(s,month)+calcInsMonth(s,month)+(BONUS_MONTHS.includes(month)?calcBonus(s,month)+calcBonusInsMonth(s,month):0);
const calcAnnualTotal = (s) => MONTHS.reduce((sum,m)=>sum+calcMonthlyTotal(s,m),0);

// 本人負担社保率
const EMP_INS_RATE = { health:0.04965, pension:0.0915, employ:0.0060 }; // 愛知県協会けんぽ2026年度
const KAIGO_RATE_EMP  = 0.00810; // 介護保険本人負担（40-64歳）1.62%/2
const KAIGO_RATE_COMP = 0.00810; // 介護保険会社負担（40-64歳）1.62%/2

// 本人負担社保（月）
const calcEmpInsMonth = (s, month) => {
  if (!isWorking(s,month)) return 0;
  if (s.empType==="PART") return 0;
  // 手動上書きがある場合はそれを本人負担社保として使用
  // （会社負担と本人負担は原則折半のため同額）
  if (s.insOverride !== null && s.insOverride !== undefined) return s.insOverride;
  const gross  = calcMonthlyGross(s, month);
  const hyojun = getHyojun(gross);
  const kaigo  = (s.age>=40 && s.age<=64) ? KAIGO_RATE_EMP : 0;
  if (s.empType==="EXEC") return Math.round(hyojun*(EMP_INS_RATE.health+EMP_INS_RATE.pension+kaigo));
  return Math.round(hyojun*(EMP_INS_RATE.health+EMP_INS_RATE.pension+EMP_INS_RATE.employ+kaigo));
};

// 給与所得控除（年収ベース）
const calcKyuyoKojo = (nenShu) => {
  if (nenShu <= 1625000)  return 550000;
  if (nenShu <= 1800000)  return Math.round(nenShu * 0.40 - 100000);
  if (nenShu <= 3600000)  return Math.round(nenShu * 0.30 + 80000);
  if (nenShu <= 6600000)  return Math.round(nenShu * 0.20 + 440000);
  if (nenShu <= 8500000)  return Math.round(nenShu * 0.10 + 1100000);
  return 1950000;
};

// 簡易所得税（月次・扶養0人ベース）
const calcIncomeTaxMonth = (s, month) => {
  if (!isWorking(s,month)) return 0;
  if (s.incomeTaxOverride !== null && s.incomeTaxOverride !== undefined) return s.incomeTaxOverride;
  const gross = calcMonthlyGross(s, month);
  const empIns = calcEmpInsMonth(s, month);
  const taxable = Math.max(gross - empIns, 0);
  // 源泉徴収税額表（月額・甲欄・扶養0人）簡易版
  if (taxable <= 88000)  return 0;
  if (taxable <= 89000)  return 130;
  if (taxable <= 90000)  return 180;
  if (taxable <= 91000)  return 230;
  if (taxable <= 92000)  return 280;
  if (taxable <= 95000)  return 360;
  if (taxable <= 100000) return 520;
  if (taxable <= 105000) return 690;
  if (taxable <= 110000) return 860;
  if (taxable <= 115000) return 1020;
  if (taxable <= 120000) return 1190;
  if (taxable <= 125000) return 1350;
  if (taxable <= 130000) return 1530;
  if (taxable <= 135000) return 1700;
  if (taxable <= 140000) return 1880;
  if (taxable <= 145000) return 2060;
  if (taxable <= 150000) return 2230;
  if (taxable <= 160000) return 2570;
  if (taxable <= 170000) return 2920;
  if (taxable <= 180000) return 3260;
  if (taxable <= 190000) return 3610;
  if (taxable <= 200000) return 3950;
  if (taxable <= 220000) return 4740;
  if (taxable <= 240000) return 5540;
  if (taxable <= 260000) return 6340;
  if (taxable <= 280000) return 7130;
  if (taxable <= 300000) return 7930;
  if (taxable <= 320000) return 8730;
  if (taxable <= 340000) return 9520;
  if (taxable <= 360000) return 10320;
  if (taxable <= 380000) return 11120;
  if (taxable <= 400000) return 11920;
  if (taxable <= 420000) return 12720;
  if (taxable <= 440000) return 13520;
  if (taxable <= 460000) return 14310;
  if (taxable <= 480000) return 15110;
  if (taxable <= 500000) return 15910;
  // 500,000超：簡易計算
  return Math.round(taxable * 0.0315 + 60);
};

// 住民税（月割り簡易計算）
const calcResidentTaxMonth = (s) => {
  if (s.residentTaxOverride !== null && s.residentTaxOverride !== undefined) return s.residentTaxOverride;
  // 年収ベースで試算
  const nenShu = s.empType==="EXEC" ? s.monthlyBase*12 : s.monthlyBase*12;
  const kyuyoKojo = calcKyuyoKojo(nenShu);
  const kisoKojo  = 430000; // 基礎控除
  const shaKaiFutan = MONTHS.reduce((sum,m)=>sum+calcEmpInsMonth(s,m),0); // 社保年額実績
  const kazeiShotoku = Math.max(nenShu - kyuyoKojo - kisoKojo - shaKaiFutan, 0);
  return Math.round(kazeiShotoku * 0.10 / 12);
};

// 手取り（月）
const calcTakeHome = (s, month) => {
  if (!isWorking(s,month)) return 0;
  const gross   = calcMonthlyGross(s, month);
  const empIns  = calcEmpInsMonth(s, month);
  const tax     = calcIncomeTaxMonth(s, month);
  const resident = calcResidentTaxMonth(s);
  return Math.max(gross - empIns - tax - resident, 0);
};

function App() {
  const [staff,      setStaff]     = useState(INIT_STAFF);
  const [tab,        setTab]       = useState("dashboard");
  const [modal,      setModal]     = useState(null);
  const [notif,      setNotif]     = useState(null);
  const [periods,    setPeriods]   = useState(INIT_PERIODS);

  const [periodModal, setPeriodModal]   = useState(false);

  const isSwitching = React.useRef(false);
  const [confirmDel, setConfirmDel] = useState(null); // {id, name} // {pid: annualTotal}

  // ベアシミュレーション状態
  const [bearAdj, setBearAdj] = useState({
    skillAdd:0, careerAdd:0,
    overrides:{} // {[id]:{skillAdd,careerAdd}}
  });
  const [showBear, setShowBear] = useState(false);

  // ── ストレージ初期化 ──────────────────────────────────
  useEffect(() => {
    (async () => {
      try {
        // 期一覧を読み込み
        const pr = localStorageGet(SK_PERIODS);
        const savedPeriods = pr ? JSON.parse(pr.value) : null;
        if (savedPeriods) setPeriods(savedPeriods);

        // 選択中の期を読み込み
        const cr = localStorageGet(SK_CURRENT);
        const pid = cr ? Number(cr.value) : 21;
        setCurrentPid(pid);

        // 選択中の期のスタッフを読み込み
        const sr = localStorageGet(SK_STAFF(pid));
        if (sr) setStaff(JSON.parse(sr.value));

        // 全期の年間合計をロード（推移グラフ用）
        const allPeriods = savedPeriods || INIT_PERIODS;
        // 第20期は実績値を初期値として使用
        const hist = { 20: PERIOD_20_DATA }; // 第20期は常に固定値
        for (const p of allPeriods) {
          if (p.id === 20) continue; // 第20期は固定値を使うのでスキップ
          const d  = localStorageGet(SK_STAFF(p.id));
          const dh = localStorageGet(SK_HANKANHI(p.id));
          const jinkenhi = d  ? JSON.parse(d.value).reduce((s,x)=>s+calcAnnualTotal(x),0) : 0;
          const hItems   = dh ? JSON.parse(dh.value) : [];
          const hankanhi = Object.values(HANKANHI_BASE_20).reduce((a,b)=>a+b,0)
            + MONTHS.reduce((s,m)=>s+hItems.reduce((ss,item)=>{
              if(item.applyType==="monthly"){
                const si=MONTH_IDX[item.startMonth??"4月"],ei=MONTH_IDX[item.endMonth??"3月"],mi=MONTH_IDX[m];
                return si<=ei?mi>=si&&mi<=ei?ss+(item.amount||0):ss:mi>=si||mi<=ei?ss+(item.amount||0):ss;
              } else if(item.applyType==="custom"){
                let prev2=0;
                for(const mm of MONTHS){ const v=item.monthlyAmounts?.[mm]; if(v!==undefined&&v!==""&&v!==null) prev2=Number(v); if(mm===m) break; }
                return ss+prev2;
              } else { return (item.specificMonths||[]).includes(m)?ss+(item.amount||0):ss; }
            },0),0);
          // ストレージ未保存（初回）の場合：第21期はINIT_STAFFで計算
          const effectiveJinkenhi = jinkenhi>0 ? jinkenhi
            : p.id===21 ? INIT_STAFF.reduce((s,x)=>s+calcAnnualTotal(x),0) : 0;
          if (effectiveJinkenhi>0) hist[p.id] = { jinkenhi:effectiveJinkenhi, hankanhi, total:effectiveJinkenhi+hankanhi };
        }
        setHistoryData(hist);

        // グレードマスタを読み込み
        const gm = localStorageGet(SK_GRADEMASTER(pid));
        if (gm) setGradeMaster(JSON.parse(gm.value));
      } catch(e) { /* 初回起動 */ }
      setStorageReady(true);
    })();
  }, []);

  // currentPidをrefでも保持（useEffect内でstaleにならないように）
  const currentPidRef = React.useRef(currentPid);
  useEffect(() => { currentPidRef.current = currentPid; }, [currentPid]);


  // ── 期切り替え ────────────────────────────────────────
  const switchPeriod = useCallback(async (pid) => {
    if (pid === currentPid) return;
    isSwitching.current = true;
    // 現在のスタッフを先に保存
    try { localStorageSet(SK_STAFF(currentPid), JSON.stringify(staff)); } catch(e) {}
    // 新しい期のスタッフをストレージから読み込み

    try {
      const sr = localStorageGet(SK_STAFF(pid));
      if (sr) newStaff = JSON.parse(sr.value);
    } catch(e) {}
    // 販管費も切り替え
    let newHankanhi = [];
    try {
      const hr = localStorageGet(SK_HANKANHI(pid));
      if (hr) newHankanhi = JSON.parse(hr.value);
    } catch(e) {}
    // 一括更新（React batched update）
    setCurrentPid(pid);
    setStaff(newStaff);
    setHankanhiItems(newHankanhi);
    setBearAdj({skillAdd:0,careerAdd:0,overrides:{}});
    setShowBear(false);
    try { localStorageSet(SK_CURRENT, String(pid)); } catch(e) {}
    const label = periods.find(p=>p.id===pid)?.label ?? `第${pid}期`;
    setNotif({msg:`${label}に切り替えました`,type:"ok"});
    setTimeout(()=>setNotif(null),3000);
    // グレードマスタも切り替え
    let newGM = GRADE_MASTER.map(g=>({...g}));
    try {
      const gmr = localStorageGet(SK_GRADEMASTER(pid));
      if (gmr) newGM = JSON.parse(gmr.value);
    } catch(e) {}
    setGradeMaster(newGM);
    // フラグ解除（次のレンダリング後）
    setTimeout(()=>{ isSwitching.current = false; }, 500);
  }, [currentPid, staff, periods]);

  // ── 新しい期を追加 ────────────────────────────────────
  const addPeriod = useCallback(async (newPeriod) => {
    const updated = [...periods, newPeriod];
    setPeriods(updated);
    localStorageSet(SK_PERIODS, JSON.stringify(updated));
    // 前の期のグレードマスタをコピー
    localStorageSet(SK_GRADEMASTER(newPeriod.id), JSON.stringify(gradeMaster));
    // 前の期のスタッフをコピーして新しい期の初期データに
    const copiedStaff = staff.map(s=>({...s, age: s.age+1,
      incomeTaxOverride:null, residentTaxOverride:null,
      insOverride:null, bonus9InsOverride:null, bonus3InsOverride:null
    }));
    localStorageSet(SK_STAFF(newPeriod.id), JSON.stringify(copiedStaff));
    switchPeriod(newPeriod.id);
    showNotif(`${newPeriod.label}を追加しました`);
  }, [periods, staff, switchPeriod]);

  // ── 販管費状態 ─────────────────────────────────────
  const [hankanhiItems, setHankanhiItems] = useState([]);
  const [csvModal, setCsvModal] = useState(null);
  const [hankanhiModal, setHankanhiModal] = useState(null);
  const [backupText, setBackupText] = useState(null); // バックアップテキスト表示用
  // グレードマスタ（期ごとに管理）
  const [gradeMaster, setGradeMaster] = useState(GRADE_MASTER.map(g=>({...g})));
  const gradeMasterByKey = useMemo(()=>Object.fromEntries(gradeMaster.map(g=>[g.key,g])),[gradeMaster]);

  // 販管費ストレージ読み込み
  useEffect(() => {
    if (!storageReady) return;
    (async () => {
      try {
        const hr = localStorageGet(SK_HANKANHI(currentPid));
        if (hr) setHankanhiItems(JSON.parse(hr.value));
        else setHankanhiItems([]);
      } catch(e) { setHankanhiItems([]); }
    })();
  }, [storageReady, currentPid]);

  // 販管費変更時に自動保存
  useEffect(() => {
    if (!storageReady) return;
    if (isSwitching.current) return; // 期切り替え中は保存しない
    const pid = currentPidRef.current;
    (async () => {
      try {
        localStorageSet(SK_HANKANHI(pid), JSON.stringify(hankanhiItems));
      } catch(e) {}
    })();
  }, [hankanhiItems, storageReady]);



  // グレードマスタ変更時に自動保存
  useEffect(() => {
    if (!storageReady) return;
    if (isSwitching.current) return;
    (async () => {
      try {
        localStorageSet(SK_GRADEMASTER(currentPid), JSON.stringify(gradeMaster));
      } catch(e) {}
    })();
  }, [gradeMaster, storageReady, currentPid]);

  // 月ごとの増減額を計算
  // custom applyTypeで空欄月は前月と同額を引き継ぐ
  const resolveCustomAmount = (monthlyAmounts) => {
    const resolved = {};
    let prev = 0;
    for (const m of MONTHS) {
      const v = monthlyAmounts?.[m];
      if (v !== undefined && v !== "" && v !== null) { prev = Number(v); }
      resolved[m] = prev;
    }
    return resolved;
  };

  const calcHankanhiDelta = useCallback((month) => {
    return hankanhiItems.reduce((sum, item) => {
      if (item.applyType === "monthly") {
        const si = MONTH_IDX[item.startMonth ?? "4月"];
        const ei = MONTH_IDX[item.endMonth   ?? "3月"];
        const mi = MONTH_IDX[month];
        const applies = si <= ei ? mi >= si && mi <= ei : mi >= si || mi <= ei;
        return applies ? sum + (item.amount || 0) : sum;
      } else if (item.applyType === "custom") {
        const resolved = resolveCustomAmount(item.monthlyAmounts);
        return sum + (resolved[month] || 0);
      } else {
        return (item.specificMonths || []).includes(month) ? sum + (item.amount || 0) : sum;
      }
    }, 0);
  }, [hankanhiItems]);

  // 月ごとの販管費合計（前年実績＋増減）
  const calcHankanhiMonth = useCallback((month) => {
    return (HANKANHI_BASE_20[month] || 0) + calcHankanhiDelta(month);
  }, [calcHankanhiDelta]);

  // ── スタッフ・販管費変更時に推移データを更新 ──
  useEffect(() => {
    if (!storageReady) return;
    if (isSwitching.current) return;
    const pid = currentPidRef.current;
    (async () => {
      try {
        localStorageSet(SK_STAFF(pid), JSON.stringify(staff));
      } catch(e) {}
      const jinkenhi = staff.reduce((s,x)=>s+calcAnnualTotal(x),0);
      const hankanhi = MONTHS.reduce((s,m)=>s+calcHankanhiMonth(m),0);
      setHistoryData(prev=>({...prev, 20: PERIOD_20_DATA, [pid]: {jinkenhi, hankanhi, total:jinkenhi+hankanhi}}));
    })();
  }, [staff, calcHankanhiMonth, storageReady]);

  const showNotif = (msg,type="ok") => { setNotif({msg,type}); setTimeout(()=>setNotif(null),3000); };

  const currentPeriod = useMemo(()=>periods.find(p=>p.id===currentPid)??PERIOD_21,[periods,currentPid]);
  const activeStaff   = useMemo(()=>staff,[staff]);

  // ベア適用後スタッフリスト
  // bearStaffは常にベア適用済み（シミュレーション計算用）
  // showBear=trueのとき経費合計・期別推移にも反映
  const bearStaff = useMemo(()=>
    staff.map(s=>applyBear(s,bearAdj))
  ,[staff,bearAdj]);
  

  const totalAnnual     = useMemo(()=>staff.reduce((s,st)=>s+calcAnnualTotal(st),0),[staff]);

  // 経費合計（労務費＋販管費）月別
  const calcMonthlyTotal_all = useCallback((month) => {
    const jinkenhi = staff.reduce((s,st)=>s+calcMonthlyTotal(st,month),0);
    return jinkenhi + calcHankanhiMonth(month);
  }, [staff, calcHankanhiMonth]);
  const bearTotalAnnual      = useMemo(()=>bearStaff.reduce((s,st)=>s+calcAnnualTotal(st),0),[bearStaff]);
  const bear_jinkenhi_annual = bearTotalAnnual;
  const hankanhi_annual      = useMemo(()=>MONTHS.reduce((s,m)=>s+calcHankanhiMonth(m),0),[calcHankanhiMonth]);
  const bear_sougou_annual   = bear_jinkenhi_annual + hankanhi_annual;
  const bearDiff             = bear_jinkenhi_annual - totalAnnual;
  const sougou_annual        = totalAnnual + hankanhi_annual;

  const monthlyTotals = useMemo(()=>
    MONTHS.map(m=>({
      month:m,
      base: staff.reduce((s,st)=>s+calcMonthlyTotal(st,m),0),
      bear: bearStaff.reduce((s,st)=>s+calcMonthlyTotal(st,m),0),
    }))
  ,[staff,bearStaff]);
  const maxMonthly = useMemo(()=>Math.max(...monthlyTotals.map(m=>m.bear),1),[monthlyTotals]);

  const openEdit = (s) => {
    // gradeKeyがempTypeと不整合な場合に補正
    let gradeKey = s.gradeKey;
    if (s.empType==="EXEC" && gradeKey!=="EXEC") gradeKey = "EXEC";
    else if (s.empType==="PART" && gradeKey!=="EN") gradeKey = "EN";
    else if ((s.empType==="FULL"||s.empType==="CONTRACT") && (gradeKey==="EXEC"||gradeKey==="EN")) gradeKey = "AS-1";
    setModal({mode:"edit", data:{...s, gradeKey}});
  };
  const openAdd  = ()  => setModal({mode:"add", data:emptyStaff()});
  const patchModal = (k,v) => setModal(p=>({...p,data:{...p.data,[k]:v}}));

  // グレード選択時にスキル給を自動セット（期のgradeMasterから参照）
  const patchGrade = (gradeKey) => {
    const g = gradeMasterByKey[gradeKey] ?? gradeByKey[gradeKey];
    if (!g) return;
    const D = modal.data;
    const newSkill = g.skillSalary;
    patchModal("gradeKey", gradeKey);
    patchModal("skillSalary", newSkill);
    patchModal("monthlyBase", newSkill+(D.careerSalary||0));
  };

  const saveModal = () => {
    const d = modal.data;
    if (!d.name.trim()) { showNotif("名前を入力してください","err"); return; }
    if (modal.mode==="add") { setStaff(p=>[...p,{...d,id:Date.now()}]); showNotif("追加しました"); }
    else { setStaff(p=>p.map(s=>s.id===d.id?d:s)); showNotif("保存しました"); }
    setModal(null);
  };

  const deleteStaff = (id, name) => {
    setConfirmDel({id, name});
  };
  const confirmDeleteExec = () => {
    if (!confirmDel) return;
    setStaff(p=>p.filter(s=>s.id!==confirmDel.id));
    setModal(null);
    setConfirmDel(null);
    showNotif(`${confirmDel.name} を削除しました`);
  };

  // ── エクスポート ─────────────────────────────────────
  const exportData = async () => {
    // 全期の販管費・グレードマスタも収集
    const hankanhiByPeriod = {};
    const gradeMasterByPeriod = {};
    for (const p of periods) {
      try {
        const hr = localStorageGet(SK_HANKANHI(p.id));
        if (hr) hankanhiByPeriod[p.id] = JSON.parse(hr.value);
        const gr = localStorageGet(SK_GRADEMASTER(p.id));
        if (gr) gradeMasterByPeriod[p.id] = JSON.parse(gr.value);
      } catch(e) {}
    }
    // 全期のスタッフも収集
    const staffByPeriodAll = { [currentPid]: staff };
    for (const p of periods) {
      if (p.id === currentPid) continue;
      try {
        const sr = localStorageGet(SK_STAFF(p.id));
        if (sr) staffByPeriodAll[p.id] = JSON.parse(sr.value);
      } catch(e) {}
    }
    const payload = {
      version: 2,
      exportedAt: new Date().toISOString(),
      periods,
      currentPeriod: currentPid,
      staffByPeriod: staffByPeriodAll,
      hankanhiByPeriod,
      gradeMasterByPeriod,
    };
    const json = JSON.stringify(payload, null, 2);
    // JSONファイルとしてダウンロード
    try {
      const blob = new Blob([json], {type: "application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const date = new Date().toISOString().slice(0,10).replace(/-/g,"");
      a.href = url;
      a.download = `jinkenhi_backup_${date}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showNotif("✅ バックアップファイルをダウンロードしました");
    } catch(e) {
      setBackupText(json);
    }
  };

  // ── インポート ─────────────────────────────────────
  const [restoreText, setRestoreText] = useState(null); // 復元テキスト入力モーダル

  const importFromText = async (jsonText) => {
    try {
      const payload = JSON.parse(jsonText);
      if (!payload.version || !payload.staffByPeriod) throw new Error("invalid");
      const merged = [...periods];
      for (const p of (payload.periods??[])) {
        if (!merged.find(x=>x.id===p.id)) merged.push(p);
      }
      setPeriods(merged);
      localStorageSet(SK_PERIODS, JSON.stringify(merged));
      // スタッフ復元（全期）
      for (const [pid, st] of Object.entries(payload.staffByPeriod)) {
        localStorageSet(SK_STAFF(Number(pid)), JSON.stringify(st));
      }
      // 販管費復元
      if (payload.hankanhiByPeriod) {
        for (const [pid, items] of Object.entries(payload.hankanhiByPeriod)) {
          localStorageSet(SK_HANKANHI(Number(pid)), JSON.stringify(items));
        }
      }
      // グレードマスタ復元
      if (payload.gradeMasterByPeriod) {
        for (const [pid, gm] of Object.entries(payload.gradeMasterByPeriod)) {
          localStorageSet(SK_GRADEMASTER(Number(pid)), JSON.stringify(gm));
        }
      }
      const targetPid = payload.currentPeriod ?? currentPid;
      const targetStaff = payload.staffByPeriod[targetPid];
      if (targetStaff) {
        setStaff(targetStaff);
        setCurrentPid(targetPid);
        localStorageSet(SK_CURRENT, String(targetPid));
      }
      // 現在の期の販管費をstateに反映
      if (payload.hankanhiByPeriod?.[targetPid]) {
        setHankanhiItems(payload.hankanhiByPeriod[targetPid]);
      }
      setRestoreText(null);
      showNotif("✅ データを復元しました（スタッフ・販管費・グレードマスタ）");
    } catch(err) {
      showNotif("❌ JSONの解析に失敗しました。内容を確認してください","err");
    }
  };

  const importData = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const payload = JSON.parse(ev.target.result);
        if (!payload.version || !payload.staffByPeriod) throw new Error("invalid");
        // 期一覧をマージ
        const merged = [...periods];
        for (const p of (payload.periods??[])) {
          if (!merged.find(x=>x.id===p.id)) merged.push(p);
        }
        setPeriods(merged);
        localStorageSet(SK_PERIODS, JSON.stringify(merged));
        // スタッフデータを復元（全期）
        for (const [pid, st] of Object.entries(payload.staffByPeriod)) {
          localStorageSet(SK_STAFF(Number(pid)), JSON.stringify(st));
        }
        // 販管費を復元（全期）
        if (payload.hankanhiByPeriod) {
          for (const [pid, items] of Object.entries(payload.hankanhiByPeriod)) {
            localStorageSet(SK_HANKANHI(Number(pid)), JSON.stringify(items));
          }
        }
        // グレードマスタを復元（全期）
        if (payload.gradeMasterByPeriod) {
          for (const [pid, gm] of Object.entries(payload.gradeMasterByPeriod)) {
            localStorageSet(SK_GRADEMASTER(Number(pid)), JSON.stringify(gm));
          }
        }
        // 現在の期のスタッフ・販管費をstateに反映
        const targetPid = payload.currentPeriod ?? currentPid;
        const targetStaff = payload.staffByPeriod[targetPid];
        if (targetStaff) {
          setStaff(targetStaff);
          setCurrentPid(targetPid);
          localStorageSet(SK_CURRENT, String(targetPid));
        }
        if (payload.hankanhiByPeriod?.[targetPid]) {
          setHankanhiItems(payload.hankanhiByPeriod[targetPid]);
        }
        showNotif("✅ データを復元しました（スタッフ・販管費・グレードマスタ）");
      } catch(err) {
        showNotif("❌ JSONの解析に失敗しました。内容を確認してください","err");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const D = modal?.data;
  const isExec   = D?.empType==="EXEC";
  const isPart   = D?.empType==="PART";
  const hasGrade = D?.empType==="FULL"||D?.empType==="CONTRACT";
  const hasAllow = D?.empType==="FULL"||D?.empType==="CONTRACT";
  const firstModalMonth = D ? (MONTHS.find(m=>{
    const mi=MONTH_IDX[m], si=MONTH_IDX[D.workStartMonth??"4月"], ei=MONTH_IDX[D.workEndMonth??"3月"];
    return si<=ei ? mi>=si&&mi<=ei : mi>=si||mi<=ei;
  })??"4月") : "4月";

  // ベアoverride更新
  const patchOverride = (id, key, val) => {
    setBearAdj(prev=>({
      ...prev,
      overrides:{
        ...prev.overrides,
        [id]:{ ...(prev.overrides[id]||{}), [key]: val===''?undefined:Number(val) }
      }
    }));
  };
  const clearOverride = (id) => {
    setBearAdj(prev=>{ const o={...prev.overrides}; delete o[id]; return {...prev,overrides:o}; });
  };

  const ET = EMP_TYPES;

  return (
    <div style={{fontFamily:"'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif",background:CS.bg,minHeight:"100vh",color:CS.text}}>

      {notif && (
        <div style={{position:"fixed",top:16,right:16,zIndex:9999,
          background:notif.type==="ok"?"#166534":"#991b1b",
          color:"#fff",padding:"10px 20px",borderRadius:10,fontSize:13,fontWeight:600,
          boxShadow:"0 4px 16px rgba(0,0,0,.2)"}}>
          {notif.type==="ok"?"✅ ":"⚠️ "}{notif.msg}
        </div>
      )}

      {/* ヘッダー */}
      <div style={{background:"#1e293b",padding:"16px 32px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 8px rgba(0,0,0,.15)"}}>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <div>
            <div style={{fontSize:10,color:"#94a3b8",letterSpacing:3,marginBottom:3}}>株式会社エディマート</div>
            <h1 style={{margin:0,fontSize:19,fontWeight:700,color:"#fff"}}>💼 経費試算システム</h1>
          </div>
          {/* 期セレクター */}
          <div style={{display:"flex",alignItems:"center",gap:8,marginLeft:16}}>
            <select
              value={currentPid}
              onChange={e=>switchPeriod(Number(e.target.value))}
              style={{background:"rgba(255,255,255,.1)",color:"#fff",border:"1px solid rgba(255,255,255,.2)",
                borderRadius:8,padding:"6px 12px",fontSize:13,fontWeight:700,cursor:"pointer",outline:"none"}}
            >
              {[...periods].reverse().map(p=>(
                <option key={p.id} value={p.id} style={{background:"#1e293b",color:"#fff"}}>
                  {p.label} {p.year}
                </option>
              ))}
            </select>
            <button
              onClick={()=>setPeriodModal(true)}
              style={{background:"rgba(255,255,255,.1)",color:"#94a3b8",border:"1px solid rgba(255,255,255,.15)",
                borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",fontWeight:600}}
              title="新しい期を追加"
            >＋ 新しい期</button>
          </div>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          {showBear && (
            <div style={{background:"#fef3c7",border:"1px solid #fde68a",borderRadius:10,padding:"8px 16px",textAlign:"center"}}>
              <div style={{fontSize:10,color:"#92400e",marginBottom:1}}>ベア後　年間増加額</div>
              <div style={{fontSize:16,fontWeight:700,color:bearTotalAnnual-totalAnnual>0?"#b45309":"#059669"}}>
                {fmtDiff(bearTotalAnnual-totalAnnual)}円
              </div>
            </div>
          )}
          {[
            {label:showBear?"ベア後　人件費":"年間人件費",   val:fmtM(showBear?bearTotalAnnual:totalAnnual), color:"#60a5fa"},
            {label:"年間販管費", val:fmtM(MONTHS.reduce((s,m)=>s+calcHankanhiMonth(m),0)), color:"#34d399"},
            {label:"年間経費合計", val:fmtM((showBear?bearTotalAnnual:totalAnnual)+MONTHS.reduce((s,m)=>s+calcHankanhiMonth(m),0)), color:"#a78bfa"},
          ].map(kpi=>(
            <div key={kpi.label} style={{background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.12)",borderRadius:10,padding:"10px 18px",textAlign:"center",minWidth:120}}>
              <div style={{fontSize:10,color:"#94a3b8",marginBottom:2}}>{kpi.label}</div>
              <div style={{fontSize:20,fontWeight:700,color:kpi.color}}>{kpi.val}</div>
            </div>
          ))}
          {/* バックアップボタン */}
          <div style={{display:"flex",flexDirection:"column",gap:6,marginLeft:8}}>
            <button onClick={exportData}
              style={{background:"#059669",color:"#fff",border:"none",borderRadius:8,
                padding:"7px 14px",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
              ⬇️ バックアップ
            </button>
            <label
              style={{background:"rgba(255,255,255,.1)",color:"#94a3b8",border:"1px solid rgba(255,255,255,.2)",
                borderRadius:8,padding:"7px 14px",fontSize:11,fontWeight:700,cursor:"pointer",textAlign:"center",whiteSpace:"nowrap",display:"inline-block"}}>
              ⬆️ 復元（ファイル）
              <input type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
            </label>

          </div>
        </div>
      </div>

      {/* タブ */}
      <div style={{background:CS.surface,borderBottom:`1px solid ${CS.border}`,padding:"0 32px",display:"flex",gap:0,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
        {[
          {k:"dashboard", label:"📊 ダッシュボード"},
          {k:"staff",     label:"👤 スタッフ管理"},
          {k:"monthly",   label:"📅 月次人件費一覧"},
          {k:"bear",      label:"📈 ベアシミュレーション"},
          {k:"grademap",  label:"🗺 キャリアマップ"},

          {k:"hankanhi",  label:"💰 販管費"},
          {k:"sougou",    label:"📋 経費合計（人件費＋販管費）"},
          {k:"history",   label:"📉 期別推移"},
        ].map(t=>(
          <button key={t.k} onClick={()=>setTab(t.k)} style={{
            padding:"14px 20px",border:"none",background:"transparent",cursor:"pointer",
            fontSize:13,fontWeight:600,
            color:tab===t.k?CS.blue:CS.sub,
            borderBottom:tab===t.k?`2px solid ${CS.blue}`:"2px solid transparent",
            transition:"color .15s"
          }}>{t.label}</button>
        ))}
      </div>

      <div style={{padding:"24px 32px",maxWidth:1440,margin:"0 auto"}}>

        {/* ══ ダッシュボード ══ */}
        {tab==="dashboard" && (() => {
          // ── ダッシュボード集計 ──
          const annualGross   = staff.reduce((s,st)=>s+MONTHS.reduce((a,m)=>a+calcMonthlyGross(st,m),0),0);
          const annualIns     = staff.reduce((s,st)=>s+MONTHS.reduce((a,m)=>a+calcInsMonth(st,m),0),0);
          const annualBonus   = staff.reduce((s,st)=>s+BONUS_MONTHS.reduce((a,m)=>a+calcBonus(st,m)+calcBonusInsMonth(st,m),0),0);
          const annualOT      = staff.reduce((s,st)=>s+MONTHS.reduce((a,m)=>{
            const rate=st.overtimeRate??0;
            if(!rate||!isWorking(st,m)) return a;
            return a+calcOvertimeDetail(st.monthlyBase,calcMonthlyOTHours(rate)).total;
          },0),0);
          const pieData = [
            {label:"基本給与",   val:annualGross-annualOT, color:"#2563eb"},
            {label:"残業代",     val:annualOT,             color:"#0ea5e9"},
            {label:"会社社保",   val:annualIns,            color:"#7c3aed"},
            {label:"賞与+賞与社保", val:annualBonus,       color:"#059669"},
          ].filter(d=>d.val>0);
          const pieTotal = pieData.reduce((s,d)=>s+d.val,0);
          // 円グラフ用SVGパス計算
          let startAngle = -Math.PI/2;
          const pieSlices = pieData.map(d=>{
            const angle = (d.val/pieTotal)*2*Math.PI;
            const x1=Math.cos(startAngle)*80+100, y1=Math.sin(startAngle)*80+100;
            startAngle+=angle;
            const x2=Math.cos(startAngle)*80+100, y2=Math.sin(startAngle)*80+100;
            const large=angle>Math.PI?1:0;
            return {...d, path:`M100,100 L${x1},${y1} A80,80 0 ${large},1 ${x2},${y2} Z`};
          });
          // 雇用形態別
          const byType = Object.entries(ET).map(([key,{label,color}])=>{
            const grp=activeStaff.filter(s=>s.empType===key);
            const tot=grp.reduce((s,st)=>s+calcAnnualTotal(st),0);
            return {key,label,color,count:grp.length,tot};
          }).filter(d=>d.tot>0);
          return (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>

            {/* ── 月次積み上げ棒グラフ（全幅） ── */}
            <div style={{gridColumn:"1/-1",...card()}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
                <STitle>月次労務費推移（内訳積み上げ）</STitle>
                <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
                  <div style={{display:"flex",gap:12,fontSize:10,color:CS.sub}}>
                    {[{c:"#2563eb",l:"基本給与"},{c:"#0ea5e9",l:"残業代"},{c:"#7c3aed",l:"社保"},{c:"#059669",l:"賞与"},{c:"#fbbf24",l:"ベア増分"}].map(({c,l})=>(
                      <span key={l}><span style={{display:"inline-block",width:10,height:10,background:c,borderRadius:2,marginRight:4}}/>{l}</span>
                    ))}
                  </div>
                  <label style={{display:"flex",alignItems:"center",gap:7,fontSize:12,color:CS.sub,cursor:"pointer"}}>
                    <input type="checkbox" checked={showBear} onChange={e=>setShowBear(e.target.checked)} style={{accentColor:CS.purple,width:14,height:14}}/>
                    ベア後を重ねて表示
                  </label>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"flex-end",gap:4,height:180,padding:"0 4px"}}>
                {MONTHS.map(month=>{
                  const isBonus = BONUS_MONTHS.includes(month);
                  const mGross  = staff.reduce((s,st)=>s+calcMonthlyGross(st,month),0);
                  const mOT     = staff.reduce((s,st)=>{
                    const rate=st.overtimeRate??0;
                    if(!rate||!isWorking(st,month)) return s;
                    return s+calcOvertimeDetail(st.monthlyBase,calcMonthlyOTHours(rate)).total;
                  },0);
                  const mBase   = mGross - mOT;
                  const mIns    = staff.reduce((s,st)=>s+calcInsMonth(st,month),0);
                  const mBonus  = isBonus ? staff.reduce((s,st)=>s+calcBonus(st,month)+calcBonusInsMonth(st,month),0) : 0;
                  const mTotal  = mBase+mOT+mIns+mBonus;
                  const bearTotal = showBear ? bearStaff.reduce((s,st)=>s+calcMonthlyTotal(st,month),0) : mTotal;
                  const maxVal  = Math.max(...MONTHS.map(m=>{
                    const bg=staff.reduce((s,st)=>s+calcMonthlyTotal(st,m),0);
                    return showBear?Math.max(bg,bearStaff.reduce((s2,st)=>s2+calcMonthlyTotal(st,m),0)):bg;
                  }),1);
                  const scale = 160/maxVal;
                  const bearExtra = showBear&&bearTotal>mTotal ? (bearTotal-mTotal)*scale : 0;
                  const segments = [
                    {val:mBase*scale,  color:"#2563eb"},
                    {val:mOT*scale,    color:"#0ea5e9"},
                    {val:mIns*scale,   color:"#7c3aed"},
                    {val:mBonus*scale, color:"#059669"},
                  ].filter(s=>s.val>0.5);
                  return (
                    <div key={month} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}>
                      <div style={{fontSize:9,color:CS.sub,marginBottom:3,fontWeight:600,whiteSpace:"nowrap"}}>
                        {fmtM(showBear?bearTotal:mTotal)}
                      </div>
                      <div style={{width:"100%",display:"flex",flexDirection:"column",alignItems:"center",gap:0}}>
                        {bearExtra>0&&<div style={{width:"75%",height:bearExtra,background:"#fbbf24",borderRadius:"3px 3px 0 0"}}/>}
                        {[...segments].reverse().map((seg,i)=>(
                          <div key={i} style={{
                            width:bearExtra>0?"75%":"100%",
                            height:seg.val,
                            background:seg.color,
                            borderRadius:i===segments.length-1?"3px 3px 0 0":0
                          }}/>
                        ))}
                      </div>
                      <div style={{fontSize:9,color:isBonus?CS.purple:CS.sub,marginTop:4,textAlign:"center",fontWeight:600}}>
                        {month}{isBonus&&<div style={{fontSize:8,color:CS.purple}}>賞与月</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* ── 費用構成ドーナツ（人件費 vs 販管費） ── */}
            <div style={card()}>
              <STitle>費用構成（年間）</STitle>
              {(() => {
                const hankanhi_y = MONTHS.reduce((s,m)=>s+calcHankanhiMonth(m),0);
                const total_y    = totalAnnual + hankanhi_y;
                const pie2 = [
                  {label:"人件費", val:totalAnnual,  color:CS.blue},
                  {label:"販管費", val:hankanhi_y,   color:CS.purple},
                ];
                let ang2 = -Math.PI/2;
                const slices2 = pie2.map(d=>{
                  const a=(d.val/total_y)*2*Math.PI;
                  const x1=Math.cos(ang2)*80+100,y1=Math.sin(ang2)*80+100;
                  ang2+=a;
                  const x2=Math.cos(ang2)*80+100,y2=Math.sin(ang2)*80+100;

                              style={{padding:"2px 7px",fontSize:11,borderRadius:4,cursor:idx===hankanhiItems.length-1?"not-allowed":"pointer",
                                border:`1px solid ${CS.border}`,background:"transparent",
                                color:idx===hankanhiItems.length-1?CS.mute:CS.text,lineHeight:1}}>▼</button>
                          </div>
                          <button onClick={()=>setHankanhiModal({mode:"edit",data:{...item}})}
                            style={{background:"transparent",color:CS.blue,border:`1px solid #bfdbfe`,
                              padding:"6px 12px",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:600}}>編集</button>
                          <button onClick={()=>setHankanhiItems(prev=>prev.filter(x=>x.id!==item.id))}
                            style={{background:"transparent",color:"#dc2626",border:"1px solid #fecaca",
                              padding:"6px 12px",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:600}}>削除</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
          );
        })()}

        {/* ══ 販管費モーダル ══ */}
        {hankanhiModal && (() => {
          const HD = hankanhiModal.data;
          const patchHD = (k,v) => setHankanhiModal(p=>({...p,data:{...p.data,[k]:v}}));
          const saveHD = () => {
            if (!HD.name.trim()) { showNotif("項目名を入力してください","err"); return; }
            if (hankanhiModal.mode==="add") {
              setHankanhiItems(prev=>[...prev,{...HD,id:Date.now()}]);
              showNotif("項目を追加しました");
            } else {
              setHankanhiItems(prev=>prev.map(x=>x.id===HD.id?HD:x));
              showNotif("保存しました");
            }
            setHankanhiModal(null);
          };
          return (
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:3000,
              display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
              <div style={{background:"#fff",borderRadius:14,padding:28,width:520,maxHeight:"90vh",
                overflowY:"auto",boxShadow:"0 8px 40px rgba(0,0,0,.2)"}}>
                <div style={{fontSize:16,fontWeight:700,marginBottom:20}}>
                  {hankanhiModal.mode==="add"?"＋ 増減項目を追加":"✏️ 増減項目を編集"}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:14}}>
                  <MField label="項目名" hint="例：新オフィス家賃差額、Slack有料化 など">
                    <input value={HD.name} onChange={e=>patchHD("name",e.target.value)}
                      style={{...iStyle,width:"100%"}} placeholder="項目名を入力"/>
                  </MField>
                  <MField label="カテゴリ" hint="自由入力">
                    <input value={HD.category} onChange={e=>patchHD("category",e.target.value)}
                      style={{...iStyle,width:"100%"}} placeholder="例：家賃・地代、広告宣伝費"/>
                  </MField>
                  {HD.applyType!=="custom" && (
                    <MField label="金額（月額）" hint="増加は正の数、削減は負の数で入力">
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <MInputN val={HD.amount} set={v=>patchHD("amount",v)} prefix="¥"/>
                        <span style={{fontSize:12,color:HD.amount>=0?"#dc2626":"#059669",fontWeight:700}}>
                          {HD.amount>=0?"▲ 増加":"▼ 削減"}
                        </span>
                      </div>
                    </MField>
                  )}
                  <MField label="適用方法">
                    <div style={{display:"flex",gap:8}}>
                      {[{v:"monthly",l:"毎月固定"},{v:"specific",l:"特定月のみ"},{v:"custom",l:"月別入力"}].map(({v,l})=>(
                        <button key={v} type="button" onClick={()=>patchHD("applyType",v)}
                          style={{flex:1,padding:"9px",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:700,
                            border:`2px solid ${HD.applyType===v?CS.blue:CS.border}`,
                            background:HD.applyType===v?"#eff6ff":"#fff",
                            color:HD.applyType===v?CS.blue:CS.sub}}>
                          {l}
                        </button>
                      ))}
                    </div>
                  </MField>
                  {HD.applyType==="monthly" ? (
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                      <MField label="開始月">
                        <select value={HD.startMonth} onChange={e=>patchHD("startMonth",e.target.value)} style={iStyle}>
                          {MONTHS.map(m=><option key={m} value={m}>{m}</option>)}
                        </select>
                      </MField>
                      <MField label="終了月">
                        <select value={HD.endMonth} onChange={e=>patchHD("endMonth",e.target.value)} style={iStyle}>
                          {MONTHS.map(m=><option key={m} value={m}>{m}</option>)}
                        </select>
                      </MField>
                    </div>
                  ) : HD.applyType==="custom" ? (
                    <MField label="月別金額入力" hint="空欄は前月と同額を引き継ぎ">
                      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                        {MONTHS.map((m,i)=>{
                          const val = HD.monthlyAmounts?.[m];
                          // 表示用：空欄なら前月引き継ぎ値をプレースホルダーに
                          const resolved = resolveCustomAmount(HD.monthlyAmounts);
                          const placeholder = i===0?"0":String(resolved[MONTHS[i-1]]||0);
                          return (
                            <div key={m}>
                              <div style={{fontSize:10,color:CS.sub,marginBottom:3,fontWeight:600}}>{m}</div>
                              <div style={{display:"flex",alignItems:"center",gap:3}}>
                                <input
                                  type="number"
                                  value={val??""}
                                  placeholder={placeholder}
                                  onChange={e=>{
                                    const v = e.target.value;
                                    patchHD("monthlyAmounts",{...(HD.monthlyAmounts||{}),
                                      [m]: v===""?undefined:Number(v)});
                                  }}
                                  style={{width:"100%",padding:"5px 7px",border:`1px solid ${val!==undefined?CS.blue:CS.border}`,
                                    borderRadius:6,fontSize:12,
                                    background:val!==undefined?"#eff6ff":"#fff",
                                    color:val!==undefined?CS.blue:CS.text,outline:"none"}}
                                />
                              </div>
                            </div>
                          );
                        })}
                      </div>
                      <div style={{marginTop:8,fontSize:11,color:CS.mute}}>
                        年間合計：<b style={{color:CS.text}}>{fmtY(MONTHS.reduce((s,m)=>s+resolveCustomAmount(HD.monthlyAmounts)[m],0))}</b>
                        　増加は正の数、削減は負の数
                      </div>
                    </MField>
                  ) : (
                    <MField label="適用月（複数選択可）">
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {MONTHS.map(m=>{
                          const on=(HD.specificMonths||[]).includes(m);
                          return (
                            <button key={m} onClick={()=>{
                              const cur=HD.specificMonths||[];
                              patchHD("specificMonths",on?cur.filter(x=>x!==m):[...cur,m]);
                            }} style={{padding:"5px 10px",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:700,
                              border:`2px solid ${on?CS.blue:CS.border}`,
                              background:on?"#eff6ff":"#fff",color:on?CS.blue:CS.sub}}>
                              {m}
                            </button>
                          );
                        })}
                      </div>
                    </MField>
                  )}
                  <MField label="メモ" hint="任意">
                    <input value={HD.note} onChange={e=>patchHD("note",e.target.value)}
                      style={{...iStyle,width:"100%"}} placeholder="例：4月から新オフィスに移転"/>
                  </MField>
                  {/* プレビュー */}
                  <div style={{background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:8,padding:"10px 14px"}}>
                    <div style={{fontSize:11,color:"#0369a1",fontWeight:700,marginBottom:6}}>年間影響試算</div>
                    {(() => {
                      const months = HD.applyType==="monthly"
                        ? MONTHS.filter(m=>{const si=MONTH_IDX[HD.startMonth??"4月"],ei=MONTH_IDX[HD.endMonth??"3月"],mi=MONTH_IDX[m];return si<=ei?mi>=si&&mi<=ei:mi>=si||mi<=ei;})
                        : (HD.specificMonths||[]);
                      const effect = months.length*(HD.amount||0);
                      return (
                        <div style={{fontSize:13,color:CS.text}}>
                          適用月数: <b>{months.length}ヶ月</b>　年間影響: <b style={{color:effect>=0?"#dc2626":"#059669"}}>{effect>=0?"+":""}{fmtM(effect)}</b>
                        </div>
                      );
                    })()}
                  </div>
                </div>
                <div style={{display:"flex",gap:10,marginTop:20}}>
                  <button onClick={saveHD}
                    style={{flex:1,background:CS.blue,color:"#fff",border:"none",padding:"11px",
                      borderRadius:9,cursor:"pointer",fontSize:13,fontWeight:700}}>
                    {hankanhiModal.mode==="add"?"追加する":"保存する"}
                  </button>
                  <button onClick={()=>setHankanhiModal(null)}
                    style={{flex:1,background:"transparent",color:CS.sub,border:`1px solid ${CS.border}`,
                      padding:"11px",borderRadius:9,cursor:"pointer",fontSize:13}}>キャンセル</button>
                </div>
              </div>
            </div>
          );
        })()}

        {/* ══ 期別推移 ══ */}
        {tab==="history" && (() => {
          const hasmulti = Object.keys(historyData).length > 0;
          const maxTotal = Math.max(...Object.values(historyData).map(d=>d?.total||0),1);
          return (
          <div style={{display:"flex",flexDirection:"column",gap:20}}>

            {/* 期別推移テーブル */}
            <div style={card()}>
              <STitle>期別経費推移</STitle>
              {!hasmulti ? (
                <div style={{textAlign:"center",padding:"40px 0",color:CS.mute,fontSize:13}}>
                  <div style={{fontSize:32,marginBottom:12}}>📉</div>
                  <div>複数の期を登録すると推移グラフが表示されます。</div>
                  <div style={{marginTop:8,fontSize:11}}>「＋ 新しい期」から次期を追加してください。</div>
                </div>
              ) : (
                <div style={{overflowX:"auto"}}>
                  <table style={{borderCollapse:"collapse",fontSize:12,width:"100%",minWidth:700}}>
                    <thead>
                      <tr>
                        {["期","年度","人件費","前期比","販管費","前期比","経費合計","前期比"].map((h,i)=>(
                          <th key={i} style={{padding:"9px 12px",textAlign:i<=1?"left":"right",
                            borderBottom:`2px solid ${CS.border}`,fontSize:11,color:CS.sub,
                            fontWeight:700,background:"#f8fafc",whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {[...periods].reverse().map((p,i,arr)=>{ const origI=periods.length-1-i;
                        const cur  = historyData[p.id];
                        const prev = origI>0 ? historyData[periods[origI-1].id] : null;
                        const isCurrent = p.id===currentPid;
                        const diff = (key) => cur&&prev ? (cur[key]||0)-(prev[key]||0) : null;
                        const fmtDiff2 = (d) => d===null?"—":d===0?"±0":(d>0?"+":"")+fmtM(d);
                        const diffColor = (d) => d===null?"#94a3b8":d>0?"#dc2626":d<0?"#059669":"#64748b";
                        return (<>
                          <tr key={p.id} style={{background:isCurrent?"#eff6ff":"#fff",
                            borderBottom:`1px solid ${CS.border}`}}>
                            <td style={{padding:"12px 12px",fontWeight:700,color:isCurrent?CS.blue:CS.text,whiteSpace:"nowrap"}}>
                              {p.label}{isCurrent&&<span style={{fontSize:9,color:CS.blue,marginLeft:4}}>▶現在</span>}
                            </td>
                            <td style={{padding:"12px 12px",color:CS.sub}}>{p.year}</td>
                            <td style={{padding:"12px 12px",textAlign:"right",fontWeight:700,color:CS.blue}}>
                              {cur?.jinkenhi?fmtM(cur.jinkenhi):"—"}
                            </td>
                            <td style={{padding:"12px 12px",textAlign:"right",fontSize:11,color:diffColor(diff("jinkenhi"))}}>
                              {fmtDiff2(diff("jinkenhi"))}
                            </td>
                            <td style={{padding:"12px 12px",textAlign:"right",fontWeight:700,color:CS.purple}}>
                              {cur?.hankanhi?fmtM(cur.hankanhi):"—"}
                            </td>
                            <td style={{padding:"12px 12px",textAlign:"right",fontSize:11,color:diffColor(diff("hankanhi"))}}>
                              {fmtDiff2(diff("hankanhi"))}
                            </td>
                            <td style={{padding:"12px 12px",textAlign:"right",fontWeight:700,color:CS.text}}>
                              {cur?.total?fmtM(cur.total):"—"}
                            </td>
                            <td style={{padding:"12px 12px",textAlign:"right",fontSize:11,color:diffColor(diff("total"))}}>
                              {fmtDiff2(diff("total"))}
                            </td>
                          </tr>
                          {/* ベア後行（現在期のみ） */}
                          {isCurrent && showBear && (
                            <tr key={`${p.id}-bear`} style={{background:"#fffbeb",borderBottom:`2px solid #f59e0b`}}>
                              <td style={{padding:"8px 12px",fontWeight:700,color:"#92400e",whiteSpace:"nowrap",fontSize:11}}>
                                └ ベア後
                              </td>
                              <td style={{padding:"8px 12px",fontSize:10,color:"#92400e"}}>試算</td>
                              <td style={{padding:"8px 12px",textAlign:"right",fontWeight:700,color:"#f59e0b"}}>
                                {fmtM(bear_jinkenhi_annual)}
                                <div style={{fontSize:9,color:"#b45309"}}>+{fmtM(bearDiff)}</div>
                              </td>
                              <td style={{padding:"8px 12px",textAlign:"right",fontSize:10,color:"#b45309"}}>
                                {cur?.jinkenhi?fmtDiff2(bear_jinkenhi_annual-(historyData[periods[origI>0?origI-1:0].id]?.jinkenhi||0)):"—"}
                              </td>
                              <td style={{padding:"8px 12px",textAlign:"right",fontWeight:700,color:CS.purple}}>
                                {fmtM(hankanhi_annual)}
                              </td>
                              <td style={{padding:"8px 12px",textAlign:"right",fontSize:10,color:"#b45309"}}>
                                {prev?fmtDiff2(hankanhi_annual-(prev.hankanhi||0)):"—"}
                              </td>
                              <td style={{padding:"8px 12px",textAlign:"right",fontWeight:700,color:"#f59e0b"}}>
                                {fmtM(bear_sougou_annual)}
                                <div style={{fontSize:9,color:"#b45309"}}>+{fmtM(bear_sougou_annual-sougou_annual)}</div>
                              </td>
                              <td style={{padding:"8px 12px",textAlign:"right",fontSize:10,color:"#b45309"}}>
                                {prev?fmtDiff2(bear_sougou_annual-(prev.total||0)):"—"}
                              </td>
                            </tr>
                          )}
                        </>);
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>

            {/* バーチャート */}
            {hasmulti && (
              <div style={card()}>
                <STitle>経費推移グラフ</STitle>
                <div style={{display:"flex",gap:12,fontSize:10,color:CS.sub,marginBottom:16}}>
                  <span><span style={{display:"inline-block",width:10,height:10,background:CS.blue,borderRadius:2,marginRight:4}}/>人件費</span>
                  <span><span style={{display:"inline-block",width:10,height:10,background:CS.purple,borderRadius:2,marginRight:4}}/>販管費</span>
                </div>
                {[...periods].reverse().map(p=>{
                  const d=historyData[p.id];
                  if(!d) return null;
                  const isCurrent=p.id===currentPid;
                  const jinPct = d.jinkenhi/maxTotal*100;
                  const hanPct = d.hankanhi/maxTotal*100;
                  return (
                    <div key={p.id} style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                      <div style={{width:70,fontSize:11,color:isCurrent?CS.blue:CS.sub,fontWeight:isCurrent?700:400,
                        textAlign:"right",flexShrink:0}}>{p.label}</div>
                      <div style={{flex:1,display:"flex",flexDirection:"column",gap:3}}>
                        <div style={{display:"flex",height:16,borderRadius:4,overflow:"hidden",background:"#f1f5f9"}}>
                          <div style={{width:`${jinPct}%`,background:CS.blue,transition:"width .4s"}}/>
                          <div style={{width:`${hanPct}%`,background:CS.purple,transition:"width .4s"}}/>
                        </div>
                        <div style={{fontSize:10,color:CS.mute}}>
                          人件費 {fmtM(d.jinkenhi)} / 販管費 {fmtM(d.hankanhi)} / 合計 {fmtM(d.total)}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* 期別データ管理 */}
            <div style={card()}>
              <STitle>期別データ管理</STitle>
              <div style={{display:"flex",flexWrap:"wrap",gap:12}}>
                {[...periods].map(p=>(
                  <div key={p.id} onClick={()=>switchPeriod(p.id)} style={{
                    padding:"14px 20px",borderRadius:10,cursor:"pointer",
                    border:`2px solid ${p.id===currentPid?CS.blue:CS.border}`,
                    background:p.id===currentPid?"#eff6ff":"#fff",minWidth:160,transition:"all .15s"
                  }}>
                    <div style={{fontSize:13,fontWeight:700,color:p.id===currentPid?CS.blue:CS.text}}>{p.label}</div>
                    <div style={{fontSize:11,color:CS.sub,marginTop:2}}>{p.year}</div>
                    {historyData[p.id]&&<>
                      <div style={{fontSize:11,color:CS.blue,marginTop:4}}>人件費 {fmtM(historyData[p.id].jinkenhi)}</div>
                      <div style={{fontSize:11,color:CS.purple}}>販管費 {fmtM(historyData[p.id].hankanhi)}</div>
                      <div style={{fontSize:11,fontWeight:700,color:CS.text}}>合計 {fmtM(historyData[p.id].total)}</div>
                    </>}
                    {p.id===currentPid&&<div style={{fontSize:10,color:CS.blue,marginTop:4,fontWeight:700}}>▶ 選択中</div>}
                  </div>
                ))}
                <div onClick={()=>setPeriodModal(true)} style={{
                  padding:"14px 20px",borderRadius:10,cursor:"pointer",
                  border:`2px dashed ${CS.border}`,background:"#f8fafc",
                  minWidth:160,display:"flex",alignItems:"center",justifyContent:"center",
                  color:CS.mute,fontSize:13,fontWeight:600
                }}>＋ 新しい期を追加</div>
              </div>
            </div>
          </div>
          );
        })()}

        {/* ══ 期追加モーダル ══ */}
        {periodModal && (() => {
          const nextId = Math.max(...periods.map(p=>p.id)) + 1;
          const nextYear = Math.max(...periods.map(p=>p.startYear)) + 1;
          const [newPeriod, setNewPeriod] = React.useState({
            id: nextId,
            label: `第${nextId}期`,
            year: `${nextYear+1}年度`,
            startYear: nextYear,
          });
          return (
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{background:"#fff",borderRadius:14,padding:28,width:360,boxShadow:"0 8px 40px rgba(0,0,0,.2)"}}>
                <div style={{fontSize:16,fontWeight:700,marginBottom:20}}>📅 新しい期を追加</div>
                <div style={{display:"flex",flexDirection:"column",gap:14}}>
                  <div>
                    <div style={{fontSize:11,color:CS.sub,marginBottom:4}}>期の名称</div>
                    <input value={newPeriod.label} onChange={e=>setNewPeriod(p=>({...p,label:e.target.value}))}
                      style={{width:"100%",padding:"8px 12px",border:`1px solid ${CS.border}`,borderRadius:8,fontSize:13}} />
                  </div>
                  <div>
                    <div style={{fontSize:11,color:CS.sub,marginBottom:4}}>年度</div>
                    <input value={newPeriod.year} onChange={e=>setNewPeriod(p=>({...p,year:e.target.value}))}
                      style={{width:"100%",padding:"8px 12px",border:`1px solid ${CS.border}`,borderRadius:8,fontSize:13}} />
                  </div>
                  <div style={{fontSize:11,color:CS.mute,background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:8,padding:"8px 12px"}}>
                    ✅ 前期のスタッフ情報を引き継ぎます（年齢+1歳、手動上書き値はリセット）
                  </div>
                </div>
                <div style={{display:"flex",gap:10,marginTop:20}}>
                  <button onClick={()=>{addPeriod(newPeriod);setPeriodModal(false);}}
                    style={{flex:1,background:CS.blue,color:"#fff",border:"none",padding:"11px",borderRadius:9,cursor:"pointer",fontSize:13,fontWeight:700}}>
                    追加する
                  </button>
                  <button onClick={()=>setPeriodModal(false)}
                    style={{flex:1,background:"transparent",color:CS.sub,border:`1px solid ${CS.border}`,padding:"11px",borderRadius:9,cursor:"pointer",fontSize:13}}>
                    キャンセル
                  </button>
                </div>
              </div>
            </div>
          );
        })()}

      <style>{`*{box-sizing:border-box;}::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-track{background:#f1f5f9;}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}input[type=number]::-webkit-inner-spin-button{opacity:.4;}button:hover{opacity:.88;}`}</style>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
